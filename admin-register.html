<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Registration - Complaint Management</title>
    
    <!-- Scripts & Fonts -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#4f46e5",
                        "primary-light": "#818cf8",
                        "background-light": "#f8fafc",
                        "background-dark": "#0f172a",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    animation: {
                        blob: "blob 10s infinite",
                    },
                    keyframes: {
                        blob: {
                            "0%": { transform: "translate(0px, 0px) scale(1)" },
                            "33%": { transform: "translate(30px, -50px) scale(1.1)" },
                            "66%": { transform: "translate(-20px, 20px) scale(0.9)" },
                            "100%": { transform: "translate(0px, 0px) scale(1)" },
                        }
                    }
                },
            },
        }
    </script>
    <style>
        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
    </style>
</head>

<body class="font-display bg-background-light dark:bg-background-dark text-slate-900 min-h-screen flex items-center justify-center p-6 relative overflow-y-auto">

    <!-- Background Accents -->
    <div class="absolute top-0 left-0 w-full h-full overflow-hidden -z-10 pointer-events-none">
        <div class="absolute top-[30%] left-[30%] w-[50%] h-[50%] bg-indigo-500/20 rounded-full blur-[120px] animate-blob"></div>
        <div class="absolute bottom-[-10%] right-[-5%] w-[50%] h-[50%] bg-purple-500/10 rounded-full blur-[120px] animate-blob" style="animation-delay: 2s;"></div>
    </div>

    <div class="w-full max-w-md relative z-10">
        <div class="glass p-10 rounded-3xl shadow-2xl relative overflow-hidden border border-indigo-100">
            <!-- decorative top border -->
            <div class="absolute top-0 left-0 w-full h-1.5 bg-gradient-to-r from-indigo-400 to-indigo-600"></div>
            
            <div class="text-center mb-10">
                <div class="bg-indigo-100 text-indigo-600 w-20 h-20 rounded-2xl flex items-center justify-center mx-auto mb-6 transform hover:rotate-12 transition-transform duration-300">
                    <span class="material-symbols-outlined text-4xl">how_to_reg</span>
                </div>
                <h1 class="text-3xl font-black text-slate-800 mb-2 tracking-tight">Admin Registration</h1>
                <p class="text-slate-500 font-medium">Create a new system operator account</p>
            </div>

            <form id="registerForm" class="space-y-5">
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">Create Username</label>
                    <div class="relative">
                        <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">person</span>
                        <input type="text" id="regUsername" placeholder="e.g. superadmin" required 
                               class="w-full pl-11 pr-4 py-3.5 bg-white/50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all font-medium text-slate-800 placeholder-slate-400">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">Create Password</label>
                    <div class="relative">
                        <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">lock</span>
                        <input type="password" id="regPassword" placeholder="Minimum 6 characters" required 
                               class="w-full pl-11 pr-4 py-3.5 bg-white/50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all font-medium text-slate-800 placeholder-slate-400">
                    </div>
                </div>

                <button type="button" id="registerBtn" class="w-full bg-gradient-to-r from-indigo-500 to-indigo-600 text-white font-bold py-4 rounded-xl shadow-[0_4px_20px_rgba(79,70,229,0.3)] hover:shadow-[0_4px_25px_rgba(79,70,229,0.5)] hover:-translate-y-1 transition-all flex justify-center items-center gap-2 group mt-4">
                    Register Admin
                    <span class="material-symbols-outlined group-hover:translate-x-1 transition-transform">person_add</span>
                </button>
            </form>

            <div class="mt-8 pt-6 border-t border-slate-200/60 text-center space-y-4">
                <p class="text-sm font-medium text-slate-600">
                    Already have an account? 
                    <a href="admin-login.html" class="text-indigo-600 font-bold hover:text-indigo-700 transition-colors">Login here</a>
                </p>
                <a href="index.html" class="inline-flex items-center gap-1.5 text-sm font-medium text-slate-500 hover:text-slate-800 transition-colors">
                    <span class="material-symbols-outlined text-lg">arrow_back</span>
                    Back to Home
                </a>
            </div>
        </div>
    </div>

    <!-- Toast Notification Container -->
    <div id="toastContainer" class="fixed top-6 right-6 z-50 flex flex-col gap-3"></div>

    <script>
        const API_BASE = '/api';

        function showToast(message, type = "success") {
            const container = document.getElementById("toastContainer");
            const toast = document.createElement("div");
            const bgColor = type === "success" ? "bg-emerald-50 text-emerald-600 border-emerald-200" : "bg-red-50 text-red-600 border-red-200";
            const icon = type === "success" ? "check_circle" : "error";
            toast.className = `flex items-center gap-3 px-5 py-4 rounded-xl shadow-lg border ${bgColor} transform transition-all duration-300 translate-x-full opacity-0`;
            toast.innerHTML = `<span class="material-symbols-outlined">${icon}</span><span class="font-bold text-sm tracking-wide">${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => { toast.classList.remove("translate-x-full", "opacity-0"); }, 10);
            setTimeout(() => {
                toast.classList.add("translate-x-full", "opacity-0");
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        document.getElementById('registerBtn').addEventListener('click', async () => {
            const username = document.getElementById('regUsername').value;
            const password = document.getElementById('regPassword').value;

            if (!username || !password) {
                showToast('Please fill in all fields', 'error');
                return;
            }

            if (password.length < 6) {
                showToast('Password must be at least 6 characters', 'error');
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/admin/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();
                
                if (response.ok) {
                    showToast('Registration successful! Redirecting...', 'success');
                    setTimeout(() => { window.location.href = 'admin-login.html'; }, 1500);
                } else {
                    showToast(data.error || 'Server error', 'error');
                }
            } catch(err) {
                showToast('Error connecting to server', 'error');
            }
        });
    </script>
</body>
</html>
