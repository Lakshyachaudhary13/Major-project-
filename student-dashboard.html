<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard - Complaint Management</title>

    <!-- Scripts & Fonts -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    

    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#8c2bee",
                        "primary-light": "#b870ff",
                        "background-light": "#f0f2f5",
                        "background-dark": "#130b1c",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    animation: {
                        blob: "blob 10s infinite",
                    },
                    keyframes: {
                        blob: {
                            "0%": { transform: "translate(0px, 0px) scale(1)" },
                            "33%": { transform: "translate(30px, -50px) scale(1.1)" },
                            "66%": { transform: "translate(-20px, 20px) scale(0.9)" },
                            "100%": { transform: "translate(0px, 0px) scale(1)" },
                        }
                    }
                },
            },
        }
    </script>
    <style>
        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        
        /* Custom scrollbar for complaints list */
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.05);
            border-radius: 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(140, 43, 238, 0.3);
            border-radius: 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: rgba(140, 43, 238, 0.6);
        }
    </style>
</head>

<body class="font-display bg-background-light dark:bg-background-dark text-slate-900 min-h-screen relative overflow-x-hidden p-4 md:p-8">

    <!-- Background Accents -->
    <div class="fixed top-0 left-0 w-full h-full overflow-hidden -z-10 pointer-events-none">
        <div class="absolute top-[-10%] left-[-5%] w-[50%] h-[50%] bg-primary/20 rounded-full blur-[120px] animate-blob"></div>
        <div class="absolute bottom-[-10%] right-[-5%] w-[50%] h-[50%] bg-pink-500/10 rounded-full blur-[120px] animate-blob" style="animation-delay: 2s;"></div>
        <div class="absolute top-[30%] left-[30%] w-[40%] h-[40%] bg-blue-500/10 rounded-full blur-[120px] animate-blob" style="animation-delay: 4s;"></div>
    </div>

    <div class="max-w-7xl mx-auto space-y-8">
        
        <!-- Header -->
        <header class="glass rounded-3xl p-8 shadow-xl relative overflow-hidden flex flex-col md:flex-row items-center justify-between gap-6 border-b-4 border-b-primary">
            <div class="flex flex-col md:flex-row items-center gap-6 text-center md:text-left">
                <div class="bg-primary/10 text-primary w-20 h-20 rounded-full flex items-center justify-center border border-primary/20 shadow-inner">
                    <span class="material-symbols-outlined text-4xl">school</span>
                </div>
                <div>
                    <h1 class="text-3xl font-black text-slate-800 tracking-tight">Student Dashboard</h1>
                    <p class="text-slate-500 font-medium">Submit and track your institutional complaints</p>
                    <div id="studentIdDisplay" class="inline-flex items-center gap-2 mt-2 px-4 py-1.5 bg-primary/10 text-primary font-bold rounded-full text-sm">
                        <!-- Filled by JS -->
                    </div>
                </div>
            </div>
            
            <button onclick="logout()" class="group flex items-center gap-2 bg-red-50 text-red-600 border border-red-200 px-6 py-3 rounded-xl font-bold hover:bg-red-500 hover:text-white transition-all shadow-sm hover:shadow-md">
                <span class="material-symbols-outlined font-medium transition-transform group-hover:-translate-x-1">logout</span>
                Secure Logout
            </button>
        </header>

        <!-- Main Grid Layout -->
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
            
            <!-- Submit Form Column -->
            <div class="lg:col-span-5 glass rounded-3xl p-8 shadow-xl">
                <div class="flex items-center gap-3 mb-8">
                    <div class="bg-primary text-white p-2 rounded-lg">
                        <span class="material-symbols-outlined">add_circle</span>
                    </div>
                    <h2 class="text-2xl font-bold text-slate-800 tracking-tight">New Complaint</h2>
                </div>

                <form id="complaintForm" class="space-y-6">
                    
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2">Complaint Department</label>
                        <div class="relative">
                            <select id="type" required class="w-full pl-4 pr-10 py-3.5 bg-white/60 border border-slate-200 rounded-xl focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all font-medium text-slate-800 appearance-none cursor-pointer">
                                <option value="" disabled selected>Select Department...</option>
                                <option value="academic">Academic &amp; Faculty</option>
                                <option value="hostel">Hostel &amp; Housing</option>
                                <option value="library">Library &amp; Resources</option>
                                <option value="other">Other Administration</option>
                            </select>
                            <span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none">expand_more</span>
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2">Priority / Category</label>
                        <div class="relative">
                            <select id="category" class="w-full pl-4 pr-10 py-3.5 bg-white/60 border border-slate-200 rounded-xl focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all font-medium text-slate-800 appearance-none cursor-pointer">
                                <option value="general">General Issue</option>
                                <option value="urgent">Urgent Matter</option>
                                <option value="feedback">Constructive Feedback</option>
                            </select>
                            <span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none">expand_more</span>
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2">Detailed Description</label>
                        <textarea id="description" rows="5" required placeholder="Please describe the issue in detail..." 
                                  class="w-full p-4 bg-white/60 border border-slate-200 rounded-xl focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all font-medium text-slate-800 resize-none"></textarea>
                    </div>

                    <button id="submitBtn" type="submit" class="w-full bg-gradient-to-r from-primary to-primary-light text-white font-bold py-4 rounded-xl shadow-[0_4px_20px_rgba(140,43,238,0.3)] hover:shadow-[0_4px_25px_rgba(140,43,238,0.5)] hover:-translate-y-1 transition-all flex justify-center items-center gap-2 group">
                        Submit Ticket
                        <span class="material-symbols-outlined group-hover:translate-x-1 group-hover:-translate-y-1 transition-transform">send</span>
                    </button>
                </form>
            </div>

            <!-- Complaints List Column -->
            <div class="lg:col-span-7 glass rounded-3xl p-8 shadow-xl flex flex-col min-h-[600px] max-h-[800px]">
                <div class="flex items-center justify-between mb-8 pb-4 border-b border-slate-200/60">
                    <div class="flex items-center gap-3">
                        <div class="bg-indigo-100 text-indigo-600 p-2 rounded-lg">
                            <span class="material-symbols-outlined">inbox</span>
                        </div>
                        <h2 class="text-2xl font-bold text-slate-800 tracking-tight">Your Track Record</h2>
                    </div>
                    <button onclick="loadComplaints()" class="text-slate-400 hover:text-primary transition-colors" title="Refresh">
                        <span class="material-symbols-outlined">refresh</span>
                    </button>
                </div>

                <!-- Dynamic List Container -->
                <div id="complaintsList" class="flex-grow overflow-y-auto custom-scrollbar pr-2 space-y-4">
                    <!-- Cards will be injected here via JS -->
                    <div class="h-full flex flex-col items-center justify-center text-slate-400 py-12">
                        <span class="material-symbols-outlined text-6xl mb-4 opacity-50 animate-spin">progress_activity</span>
                        <p class="text-lg font-medium">Loading complaints...</p>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- Toast Notification Container -->
    <div id="toastContainer" class="fixed top-6 right-6 z-50 flex flex-col gap-3"></div>

    <script>
        const API_BASE = '/api';

        // Mapping statuses to Tailwind color schemes
        const statusColors = {
            'pending':    'bg-amber-100 text-amber-700 border-amber-200',
            'in-progress':'bg-blue-100 text-blue-700 border-blue-200',
            'resolved':   'bg-emerald-100 text-emerald-700 border-emerald-200',
            'rejected':   'bg-red-100 text-red-700 border-red-200',
            'default':    'bg-slate-100 text-slate-700 border-slate-200'
        };

        const statusIcons = {
            'pending':     'hourglass_empty',
            'in-progress': 'autorenew',
            'resolved':    'check_circle',
            'rejected':    'cancel',
            'default':     'info'
        };

        function showToast(message, type = "success") {
            const container = document.getElementById("toastContainer");
            const toast = document.createElement("div");
            
            const bgColor = type === "success"
                ? "bg-emerald-50 text-emerald-600 border-emerald-200"
                : "bg-red-50 text-red-600 border-red-200";
            const icon = type === "success" ? "check_circle" : "error";

            toast.className = `flex items-center gap-3 px-5 py-4 rounded-xl shadow-lg border ${bgColor} transform transition-all duration-300 translate-x-full opacity-0`;
            toast.innerHTML = `
                <span class="material-symbols-outlined">${icon}</span>
                <span class="font-bold text-sm tracking-wide">${message}</span>
            `;
            
            container.appendChild(toast);
            
            setTimeout(() => { toast.classList.remove("translate-x-full", "opacity-0"); }, 10);
            setTimeout(() => {
                toast.classList.add("translate-x-full", "opacity-0");
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // Check session from backend
        async function initDashboard() {
            try {
                const response = await fetch(`${API_BASE}/students/session`, { credentials: 'include' });

                if (!response.ok) {
                    // Not authenticated - redirect to login
                    window.location.href = "student.html";
                    return;
                }

                const student = await response.json();
                const displayEl = document.getElementById("studentIdDisplay");
                if (displayEl) {
                    displayEl.innerHTML = `<span class="material-symbols-outlined text-sm">badge</span> ${student.studentId || student.student_id || ''}`;
                }

                loadComplaints();
            } catch(err) {
                console.error('Session check failed:', err);
                // Fall back to localStorage check
                const loggedStudent = JSON.parse(localStorage.getItem("loggedStudent"));
                if (!loggedStudent) {
                    window.location.href = "student.html";
                    return;
                }
                const displayEl = document.getElementById("studentIdDisplay");
                if (displayEl) {
                    displayEl.innerHTML = `<span class="material-symbols-outlined text-sm">badge</span> ${loggedStudent.studentId || ''}`;
                }
                loadComplaints();
            }
        }

        // Load complaints from backend
        async function loadComplaints() {
            const container = document.getElementById("complaintsList");
            container.innerHTML = `
                <div class="h-full flex flex-col items-center justify-center text-slate-400 py-12">
                    <span class="material-symbols-outlined text-6xl mb-4 opacity-50 animate-spin">progress_activity</span>
                    <p class="text-lg font-medium">Loading complaints...</p>
                </div>
            `;

            try {
                const response = await fetch(`${API_BASE}/complaints/my`, { credentials: 'include' });

                if (!response.ok) {
                    throw new Error('Failed to load complaints');
                }

                const complaints = await response.json();
                renderComplaints(complaints);
            } catch(err) {
                console.error('Error loading complaints:', err);
                container.innerHTML = `
                    <div class="h-full flex flex-col items-center justify-center text-red-400 py-12">
                        <span class="material-symbols-outlined text-6xl mb-4 opacity-50">error</span>
                        <p class="text-lg font-medium">Failed to load complaints.</p>
                        <p class="text-sm">Make sure the server is running.</p>
                    </div>
                `;
            }
        }

        function renderComplaints(complaints) {
            const container = document.getElementById("complaintsList");

            if (!Array.isArray(complaints) || complaints.length === 0) {
                container.innerHTML = `
                    <div class="h-full flex flex-col items-center justify-center text-slate-400 py-12">
                        <span class="material-symbols-outlined text-6xl mb-4 opacity-50">inbox</span>
                        <p class="text-lg font-medium">No complaints submitted yet.</p>
                        <p class="text-sm">Use the form to create your first ticket.</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = "";

            [...complaints].reverse().forEach(c => {
                const status = (c.status || 'pending').toLowerCase();
                const colorScheme = statusColors[status] || statusColors['default'];
                const icon = statusIcons[status] || statusIcons['default'];
                const capitalize = s => s.charAt(0).toUpperCase() + s.slice(1);
                
                const div = document.createElement("div");
                div.className = "bg-white/80 border border-slate-200 p-5 rounded-2xl shadow-sm hover:shadow-md transition-shadow";
                div.innerHTML = `
                    <div class="flex justify-between items-start mb-3">
                        <div>
                            <span class="inline-block px-3 py-1 bg-slate-100 text-slate-600 text-xs font-bold rounded-full mb-2 uppercase tracking-wider">${c.category || 'general'}</span>
                            <h4 class="font-bold text-lg text-slate-800">${capitalize(c.type || '')} Issue</h4>
                        </div>
                        <span class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg border ${colorScheme} text-xs font-bold uppercase tracking-wider">
                            <span class="material-symbols-outlined text-[16px]">${icon}</span>
                            ${c.status || 'pending'}
                        </span>
                    </div>
                    <p class="text-slate-600 mb-4 bg-slate-50/50 p-4 rounded-xl border border-slate-100 text-sm leading-relaxed">${c.description}</p>
                    <div class="flex items-center text-xs text-slate-400 font-medium">
                        <span class="material-symbols-outlined text-[16px] mr-1">schedule</span>
                        Submitted: ${new Date(c.timestamp || c.created_at || Date.now()).toLocaleString()}
                    </div>
                `;
                container.appendChild(div);
            });
        }

        // Submit complaint to backend
        document.getElementById("complaintForm").addEventListener("submit", async function(e) {
            e.preventDefault();
            const type = document.getElementById("type").value;
            const category = document.getElementById("category").value;
            const description = document.getElementById("description").value.trim();
            const btn = document.getElementById("submitBtn");

            if (!description) return;

            btn.disabled = true;
            btn.innerHTML = `<span class="material-symbols-outlined animate-spin">progress_activity</span> Submitting...`;

            try {
                const response = await fetch(`${API_BASE}/complaints`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ type, category, description })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Failed to submit complaint');
                }

                this.reset();
                showToast("Complaint Submitted Successfully");
                loadComplaints();
            } catch(err) {
                showToast(err.message, "error");
            } finally {
                btn.disabled = false;
                btn.innerHTML = `Submit Ticket <span class="material-symbols-outlined">send</span>`;
            }
        });

        function logout() {
            fetch(`${API_BASE}/students/logout`, { method: 'POST', credentials: 'include' })
                .catch(() => {})
                .finally(() => {
                localStorage.removeItem("loggedStudent");
                window.location.href = "index.html";
                });
        }

        // Initialize
        initDashboard();
    </script>
</body>
</html>
