<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Student Portal - Complaint Management</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

body{
font-family:'Inter',sans-serif;
background:linear-gradient(135deg,#667eea,#764ba2);
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:20px;
}

.auth-container{
max-width:450px;
width:100%;
}

.auth-card{
background:white;
border-radius:20px;
padding:2.5rem;
box-shadow:0 20px 60px rgba(0,0,0,0.2);
}

.auth-header{
text-align:center;
margin-bottom:2rem;
}

.auth-header i{
font-size:3rem;
color:#4f46e5;
margin-bottom:1rem;
}

.auth-header h1{
font-size:1.8rem;
margin-bottom:0.5rem;
}

.form-group{
margin-bottom:1.25rem;
}

.form-group input{
width:100%;
padding:0.875rem;
border:2px solid #f3f4f6;
border-radius:10px;
font-size:1rem;
}

.btn{
width:100%;
background:#4f46e5;
color:white;
border:none;
padding:1rem;
border-radius:10px;
font-size:1rem;
font-weight:600;
cursor:pointer;
}

.toggle-link{
text-align:center;
margin-top:10px;
}

.toggle-link a{
color:#4f46e5;
text-decoration:none;
font-weight:600;
}

.home-link{
text-align:center;
margin-top:15px;
}

</style>

</head>

<body>

<!-- public URL banner (hidden default) -->
<div id="publicUrlBanner" class="public-url-banner hidden">
    <span id="publicUrlText"></span>
    <button class="copy-btn">Copy</button>
</div>

<div class="auth-container">

<div class="auth-card">

<div class="auth-header">

<i class="fas fa-graduation-cap"></i>

<h1>Student Portal</h1>

<p>Login to submit complaints</p>

</div>

<form id="loginForm">

<div class="form-group">

<input type="email" id="loginGmail" placeholder="Enter Gmail Address" required>

</div>

<div class="form-group">

<input type="text" id="loginStudentId" placeholder="Enter Student ID" required>

</div>

<button class="btn">
<i class="fas fa-sign-in-alt"></i> Login
</button>

</form>

<div class="toggle-link">

Don't have an account?
<a href="student-register.html">Register here</a>

</div>

<div class="home-link">

<a href="index.html">
<i class="fas fa-home"></i> Back to Home
</a>

</div>

</div>

</div>


<script>

document.getElementById("loginForm").addEventListener("submit",function(e){

e.preventDefault();

let gmail=document.getElementById("loginGmail").value;

let studentId=document.getElementById("loginStudentId").value;

let students=JSON.parse(localStorage.getItem("students"))||[];

let user=students.find(s=>s.gmail===gmail && s.studentId===studentId);

if(!user){

alert("Invalid Login");

return;

}

localStorage.setItem("loggedStudent",JSON.stringify(user));

alert("Login Successful");

window.location="student-dashboard.html";

});

</script>

</body>
</html>
