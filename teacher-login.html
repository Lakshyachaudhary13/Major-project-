<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Login - Complaint Management</title>
    
    <!-- Scripts & Fonts -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    
    
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#8c2bee",
                        "primary-light": "#b870ff",
                        "background-light": "#f0f2f5",
                        "background-dark": "#130b1c",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    animation: {
                        blob: "blob 10s infinite",
                    },
                    keyframes: {
                        blob: {
                            "0%": { transform: "translate(0px, 0px) scale(1)" },
                            "33%": { transform: "translate(30px, -50px) scale(1.1)" },
                            "66%": { transform: "translate(-20px, 20px) scale(0.9)" },
                            "100%": { transform: "translate(0px, 0px) scale(1)" },
                        }
                    }
                },
            },
        }
    </script>
    <style>
        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
    </style>
</head>

<body class="font-display bg-background-light dark:bg-background-dark text-slate-900 min-h-screen flex items-center justify-center p-6 relative overflow-hidden">

    <!-- Background Accents -->
    <div class="absolute top-0 left-0 w-full h-full overflow-hidden -z-10 pointer-events-none">
        <div class="absolute top-[-10%] left-[-5%] w-[50%] h-[50%] bg-primary/20 rounded-full blur-[120px] animate-blob"></div>
        <div class="absolute bottom-[-10%] right-[-5%] w-[50%] h-[50%] bg-pink-500/10 rounded-full blur-[120px] animate-blob" style="animation-delay: 2s;"></div>
    </div>

    <!-- public URL banner (hidden by default) -->
    <div id="publicUrlBanner" class="hidden absolute top-0 left-0 w-full bg-gradient-to-r from-blue-500 to-indigo-600 text-white text-center py-2 px-4 shadow-lg z-[100] border-b border-indigo-400">
        <span id="publicUrlText" class="font-semibold text-sm mr-4 truncate inline-block max-w-[70%] align-middle tracking-wide shadow-text"></span>
        <button class="bg-white text-indigo-700 hover:bg-indigo-50 font-bold py-1 px-4 rounded text-xs transition duration-200 border border-indigo-100 shadow-sm uppercase tracking-wider copy-btn">Copy URL</button>
    </div>

    <div class="w-full max-w-md relative z-10">
        <div class="glass p-10 rounded-3xl shadow-2xl relative overflow-hidden">
            <!-- decorative top border -->
            <div class="absolute top-0 left-0 w-full h-1.5 bg-gradient-to-r from-emerald-400 to-emerald-600"></div>
            
            <div class="text-center mb-10">
                <div class="bg-emerald-100 text-emerald-600 w-20 h-20 rounded-2xl flex items-center justify-center mx-auto mb-6 transform hover:rotate-12 transition-transform duration-300">
                    <span class="material-symbols-outlined text-4xl">co_present</span>
                </div>
                <h1 class="text-3xl font-black text-slate-800 mb-2 tracking-tight">Teacher Portal</h1>
                <p class="text-slate-500 font-medium">Access your administration dashboard</p>
            </div>

            <form id="loginForm" class="space-y-5">
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">Gmail Address</label>
                    <div class="relative">
                        <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">mail</span>
                        <input type="email" id="loginGmail" placeholder="yourname@gmail.com" required 
                               class="w-full pl-11 pr-4 py-3.5 bg-white/50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-emerald-500/20 focus:border-emerald-500 transition-all font-medium text-slate-800 placeholder-slate-400">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">Teacher ID</label>
                    <div class="relative">
                        <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">badge</span>
                        <input type="text" id="loginTeacherId" placeholder="Enter your ID" required 
                               class="w-full pl-11 pr-4 py-3.5 bg-white/50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-emerald-500/20 focus:border-emerald-500 transition-all font-medium text-slate-800 placeholder-slate-400">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">Password</label>
                    <div class="relative">
                        <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">lock</span>
                        <input type="password" id="loginPassword" placeholder="Enter your password" required 
                               class="w-full pl-11 pr-4 py-3.5 bg-white/50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-emerald-500/20 focus:border-emerald-500 transition-all font-medium text-slate-800 placeholder-slate-400">
                    </div>
                </div>

                <button type="button" id="loginBtn" class="w-full bg-gradient-to-r from-emerald-500 to-emerald-600 text-white font-bold py-4 rounded-xl shadow-[0_4px_20px_rgba(16,185,129,0.3)] hover:shadow-[0_4px_25px_rgba(16,185,129,0.5)] hover:-translate-y-1 transition-all flex justify-center items-center gap-2 group mt-4">
                    Secure Login
                    <span class="material-symbols-outlined group-hover:translate-x-1 transition-transform">login</span>
                </button>
            </form>

            <div class="mt-8 pt-6 border-t border-slate-200/60 text-center space-y-4">
                <p class="text-sm font-medium text-slate-600">
                    Don't have an account? 
                    <a href="teacher-register.html" class="text-emerald-600 font-bold hover:text-emerald-700 transition-colors">Register here</a>
                </p>
                <a href="index.html" class="inline-flex items-center gap-1.5 text-sm font-medium text-slate-500 hover:text-slate-800 transition-colors">
                    <span class="material-symbols-outlined text-lg">arrow_back</span>
                    Back to Home
                </a>
            </div>
        </div>
    </div>

    <!-- Toast Notification Container -->
    <div id="toastContainer" class="fixed top-6 right-6 z-50 flex flex-col gap-3"></div>

    <script>
        const API_BASE = '/api';

        function showToast(message, type = "success") {
            const container = document.getElementById("toastContainer");
            const toast = document.createElement("div");
            const bgColor = type === "success" ? "bg-emerald-50 text-emerald-600 border-emerald-200" : "bg-red-50 text-red-600 border-red-200";
            const icon = type === "success" ? "check_circle" : "error";
            toast.className = `flex items-center gap-3 px-5 py-4 rounded-xl shadow-lg border ${bgColor} transform transition-all duration-300 translate-x-full opacity-0`;
            toast.innerHTML = `<span class="material-symbols-outlined">${icon}</span><span class="font-bold text-sm tracking-wide">${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => { toast.classList.remove("translate-x-full", "opacity-0"); }, 10);
            setTimeout(() => {
                toast.classList.add("translate-x-full", "opacity-0");
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        document.getElementById('loginBtn').addEventListener('click', async () => {
            const gmail = document.getElementById('loginGmail').value;
            const teacherId = document.getElementById('loginTeacherId').value;
            const password = document.getElementById('loginPassword').value;

            if (!gmail || !teacherId || !password) {
                showToast('Please fill in all fields', 'error');
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/teachers/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ gmail, teacherId, password })
                });
                const data = await response.json();
                if (response.ok) {
                    showToast('Login successful!', 'success');
                    localStorage.setItem("loggedTeacher", JSON.stringify(data));
                    setTimeout(() => { window.location.href = 'teacher-dashboard.html'; }, 800);
                } else {
                    showToast(data.error || 'Login failed', 'error');
                }
            } catch (error) {
                showToast('Login failed. Please try again.', 'error');
            }
        });
    </script>
</body>
</html>
