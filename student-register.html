<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Registration - Complaint Management</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:linear-gradient(135deg,#667eea,#764ba2);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.auth-container{
width:420px;
}

.auth-card{
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 10px 40px rgba(0,0,0,0.2);
}

.auth-header{
text-align:center;
margin-bottom:20px;
}

.auth-header i{
font-size:45px;
color:#4f46e5;
margin-bottom:10px;
}

.auth-header h1{
font-size:24px;
margin-bottom:5px;
}

.auth-header p{
color:gray;
}

.form-group{
margin-bottom:15px;
}

.form-group label{
font-weight:600;
font-size:14px;
display:block;
margin-bottom:6px;
}

.form-group input{
width:100%;
padding:10px;
border:2px solid #eee;
border-radius:8px;
font-size:14px;
}

.form-group input:focus{
outline:none;
border-color:#4f46e5;
}

.btn{
width:100%;
padding:12px;
background:#4f46e5;
color:white;
border:none;
border-radius:8px;
font-size:16px;
font-weight:600;
cursor:pointer;
}

.btn:hover{
background:#4338ca;
}

.toggle-link{
text-align:center;
margin-top:15px;
}

.toggle-link a{
color:#4f46e5;
text-decoration:none;
font-weight:600;
}

.home-link{
text-align:center;
margin-top:15px;
}
.home-link a{
color:#181819;
text-decoration:none;
font-size:0.9rem;
}
.home-link a:hover{
color:#4338ca;
}

.success-message{
display:none;
text-align:center;
background:white;
padding:40px;
border-radius:15px;
box-shadow:0 10px 40px rgba(0,0,0,0.2);
}

.success-message i{
font-size:60px;
color:#10b981;
margin-bottom:10px;
}

.toast{
position:fixed;
top:20px;
right:20px;
background:#10b981;
color:white;
padding:12px 20px;
border-radius:8px;
}

.toast.error{
background:#ef4444;
}

</style>
</head>

<body>

<div class="auth-container">

<div class="auth-card">

<div class="auth-header">
<i class="fas fa-user-plus"></i>
<h1>Student Registration</h1>
<p>Create your account</p>
</div>

<form id="registerForm">

<div class="form-group">
<label>Full Name</label>
<input type="text" id="regName" required>
</div>

<div class="form-group">
<label>Gmail Address</label>
<input type="email" id="regGmail" placeholder="yourname@gmail.com" required>
</div>

<div class="form-group">
<label>Student ID</label>
<input type="text" id="regStudentId" required>
</div>

<div class="form-group">
<label>Phone Number</label>
<input type="tel" id="regPhone">
</div>

<button class="btn">Register</button>

</form>

<div class="toggle-link">
Already have account? <a href="student.html">Login</a>
</div>

<div class="home-link">
    <a href="index.html"><i class="fas fa-home"></i> Back to Home</a>
</div>

</div>

<div id="successMessage" class="success-message">
<i class="fas fa-check-circle"></i>
<h2>Registration Successful</h2>
<p>Your account has been created</p>
<a href="student.html" class="btn">Go to Login</a>
<div class="home-link" style="margin-top:20px;">
    <a href="index.html"><i class="fas fa-home"></i> Back to Home</a>
</div>
</div>

</div>

<div id="toastContainer"></div>
            </div>

<script>

function showToast(message,type="success"){

const toast=document.createElement("div");
toast.className="toast "+type;
toast.innerText=message;

document.body.appendChild(toast);

setTimeout(()=>{
toast.remove();
},3000);

}

document.getElementById("registerForm").addEventListener("submit",function(e){

e.preventDefault();

const name=document.getElementById("regName").value;
const gmail=document.getElementById("regGmail").value;
const studentId=document.getElementById("regStudentId").value;
const phone=document.getElementById("regPhone").value;

if(!gmail.endsWith("@gmail.com")){
showToast("Enter valid Gmail","error");
return;
}

let students=JSON.parse(localStorage.getItem("students"))||[];

let exists=students.find(s=>s.studentId===studentId);

if(exists){
showToast("Student ID already exists","error");
return;
}

const student={
name:name,
gmail:gmail,
studentId:studentId,
phone:phone 
};

students.push(student);

localStorage.setItem("students",JSON.stringify(students));

showToast("Registration Successful");

document.getElementById("registerForm").reset();

document.querySelector(".auth-card").style.display="none";
document.getElementById("successMessage").style.display="block";

});

</script>

</body>
</html>
