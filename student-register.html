<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration - Complaint Management</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --primary: #4f46e5; --primary-dark: #4338ca; --secondary: #10b981; --accent: #f59e0b; --danger: #ef4444; --dark: #1f2937; --gray: #6b7280; --light: #f3f4f6; --white: #ffffff; }
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-container { max-width: 500px; width: 100%; }
        .auth-card { background: white; border-radius: 20px; padding: 2.5rem; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
        .auth-header { text-align: center; margin-bottom: 2rem; }
        .auth-header i { font-size: 3rem; color: var(--primary); margin-bottom: 1rem; }
        .auth-header h1 { font-size: 1.8rem; color: var(--dark); margin-bottom: 0.5rem; }
        .auth-header p { color: var(--gray); }
        .form-group { margin-bottom: 1.25rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-weight: 600; color: var(--dark); font-size: 0.9rem; }
        .form-group input, .form-group select { width: 100%; padding: 0.875rem; border: 2px solid var(--light); border-radius: 10px; font-size: 1rem; font-family: inherit; transition: all 0.3s; }
        .form-group input:focus, .form-group select:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79,70,229,0.1); }
        .btn { width: 100%; background: var(--primary); color: white; border: none; padding: 1rem; border-radius: 10px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.3s; margin-bottom: 1rem; }
        .btn:hover { background: var(--primary-dark); transform: translateY(-2px); box-shadow: 0 10px 30px rgba(79,70,229,0.3); }
        .toggle-link { text-align: center; color: var(--gray); margin-top: 1rem; }
        .toggle-link a { color: var(--primary); cursor: pointer; font-weight: 600; text-decoration: none; }
        .toggle-link a:hover { text-decoration: underline; }
        .toast { position: fixed; top: 20px; right: 20px; padding: 1rem 1.5rem; border-radius: 10px; color: white; font-weight: 500; z-index: 1000; animation: slideIn 0.3s ease; }
        .toast.success { background: var(--secondary); }
        .toast.error { background: var(--danger); }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
        .home-link { text-align: center; margin-top: 1.5rem; }
        .home-link a { color: var(--gray); text-decoration: none; font-size: 0.9rem; }
        .home-link a:hover { color: var(--primary); }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <i class="fas fa-user-plus"></i>
                <h1>Student Registration</h1>
                <p>Create a new student account</p>
            </div>
            <form id="registerForm">
                <div class="form-group">
                    <label><i class="fas fa-user"></i> Full Name</label>
                    <input type="text" id="regName" placeholder="Enter your full name" required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-envelope"></i> Gmail Address</label>
                    <input type="email" id="regGmail" placeholder="yourname@gmail.com" required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-id-card"></i> Student ID</label>
                    <input type="text" id="regStudentId" placeholder="Choose a Student ID" required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-phone"></i> Phone Number (Optional)</label>
                    <input type="tel" id="regPhone" placeholder="Enter phone number">
                </div>
                <button type="submit" class="btn"><i class="fas fa-user-plus"></i> Register</button>
            </form>
            <div class="toggle-link">
                Already have an account? <a href="student.html">Login here</a>
            </div>
            <div class="home-link">
                <a href="index.html"><i class="fas fa-home"></i> Back to Home</a>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script>
        const API_BASE = '/api';

        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // Register form submission
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('regName').value;
            const gmail = document.getElementById('regGmail').value;
            const studentId = document.getElementById('regStudentId').value;
            const phone = document.getElementById('regPhone').value;

            if (!gmail.endsWith('@gmail.com')) {
                showToast('Please use a valid Gmail address', 'error');
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/students/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ name, gmail, studentId, phone })
                });
                const data = await response.json();
                if (response.ok) {
                    showToast('Registration successful! Please login.');
                    document.getElementById('registerForm').reset();
                    setTimeout(() => {
                        window.location.href = 'student.html';
                    }, 2000);
                } else {
                    showToast(data.error || 'Registration failed', 'error');
                }
            } catch (error) {
                showToast('Registration failed. Please try again.', 'error');
            }
        });
    </script>
</body>
</html>
