<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teacher Registration - Complaint Management</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

:root{
--primary:#4f46e5;
--primary-dark:#4338ca;
--secondary:#10b981;
--accent:#f59e0b;
--danger:#ef4444;
--dark:#1f2937;
--gray:#6b7280;
--light:#f3f4f6;
--white:#ffffff;
}

body{
font-family:'Inter',sans-serif;
background:linear-gradient(135deg,#059669 0%,#047857 100%);
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:20px;
}

.auth-container{
max-width:500px;
width:100%;
}

.auth-card{
background:white;
border-radius:20px;
padding:2.5rem;
box-shadow:0 20px 60px rgba(0,0,0,0.2);
}

.auth-header{
text-align:center;
margin-bottom:2rem;
}

.auth-header i{
font-size:3rem;
color:var(--secondary);
margin-bottom:1rem;
}

.auth-header h1{
font-size:1.8rem;
color:var(--dark);
margin-bottom:0.5rem;
}

.auth-header p{
color:var(--gray);
}

.form-group{
margin-bottom:1.25rem;
}

.form-group label{
display:block;
margin-bottom:0.5rem;
font-weight:600;
color:var(--dark);
font-size:0.9rem;
}

.form-group input{
width:100%;
padding:0.875rem;
border:2px solid var(--light);
border-radius:10px;
font-size:1rem;
transition:all 0.3s;
}

.form-group input:focus{
outline:none;
border-color:var(--secondary);
box-shadow:0 0 0 3px rgba(16,185,129,0.1);
}

.btn{
width:100%;
background:var(--secondary);
color:white;
border:none;
padding:1rem;
border-radius:10px;
font-size:1rem;
font-weight:600;
cursor:pointer;
transition:all 0.3s;
margin-bottom:1rem;
}

.btn:hover{
background:#059669;
transform:translateY(-2px);
box-shadow:0 10px 30px rgba(16,185,129,0.3);
}

.toggle-link{
text-align:center;
color:var(--gray);
margin-top:1rem;
}

.toggle-link a{
color:var(--secondary);
font-weight:600;
text-decoration:none;
}

.toggle-link a:hover{
text-decoration:underline;
}

.home-link{
text-align:center;
margin-top:1.5rem;
}

.home-link a{
color:var(--gray);
text-decoration:none;
font-size:0.9rem;
}

.home-link a:hover{
color:var(--secondary);
}

.success-message{
text-align:center;
padding:2rem;
display:none;
}

.success-message i{
font-size:4rem;
color:var(--secondary);
margin-bottom:1rem;
}

.success-message h2{
color:var(--dark);
margin-bottom:0.5rem;
}

.success-message p{
color:var(--gray);
margin-bottom:1.5rem;
}

.success-message .btn{
display:inline-block;
width:auto;
padding:0.75rem 2rem;
}

.toast{
position:fixed;
top:20px;
right:20px;
padding:1rem 1.5rem;
border-radius:10px;
color:white;
font-weight:500;
z-index:1000;
animation:slideIn 0.3s ease;
}

.toast.success{background:var(--secondary);}
.toast.error{background:var(--danger);}

@keyframes slideIn{
from{transform:translateX(100%);}
to{transform:translateX(0);}
}
</style>
</head>

<body>

<div class="auth-container">

<div class="auth-card">

<div id="registrationForm">

<div class="auth-header">
<i class="fas fa-user-plus"></i>
<h1>Teacher Registration</h1>
<p>Create a new teacher account</p>
</div>

<div class="form-group">
<label><i class="fas fa-user"></i> Full Name</label>
<input type="text" id="regName" placeholder="Enter your full name" required>
</div>

<div class="form-group">
<label><i class="fas fa-envelope"></i> Gmail Address</label>
<input type="email" id="regGmail" placeholder="yourname@gmail.com" required>
</div>

<div class="form-group">
<label><i class="fas fa-id-card"></i> Teacher ID</label>
<input type="text" id="regTeacherId" placeholder="Choose a Teacher ID" required>
</div>

<div class="form-group">
<label><i class="fas fa-building"></i> Department</label>
<input type="text" id="regDepartment" placeholder="Enter department">
</div>

<div class="form-group">
<label><i class="fas fa-lock"></i> Password</label>
<input type="password" id="regPassword" placeholder="Create a password" required>
</div>

<button id="registerBtn" class="btn">
<i class="fas fa-user-plus"></i> Register
</button>

</div>

<div class="toggle-link">
Already have an account? <a href="teacher-login.html">Login here</a>
</div>

<div class="home-link">
<a href="index.html"><i class="fas fa-home"></i> Back to Home</a>
</div>

<div id="successMessage" class="success-message">
<i class="fas fa-check-circle"></i>
<h2>Registration Complete!</h2>
<p>Your teacher account has been created successfully.</p>
<a href="teacher-login.html" class="btn">Go to Login</a>
</div>

</div>

</div>

<div id="toastContainer"></div>

<script>

function showToast(message,type='success'){
const container=document.getElementById('toastContainer')
const toast=document.createElement('div')
toast.className=`toast ${type}`
toast.textContent=message
container.appendChild(toast)
setTimeout(()=>toast.remove(),3000)
}

document.getElementById('registerBtn').addEventListener('click',()=>{

const name=document.getElementById('regName').value
const gmail=document.getElementById('regGmail').value
const teacherId=document.getElementById('regTeacherId').value
const department=document.getElementById('regDepartment').value
const password=document.getElementById('regPassword').value

if(!gmail.endsWith('@gmail.com')){
showToast('Please use a valid Gmail address','error')
return
}

let teachers=JSON.parse(localStorage.getItem("teachers"))||[]

const teacher={
name:name,
gmail:gmail,
teacherId:teacherId,
department:department,
password:password
}

teachers.push(teacher)

localStorage.setItem("teachers",JSON.stringify(teachers))

showToast("Registration successful!")

document.getElementById('registrationForm').style.display='none'
document.getElementById('successMessage').style.display='block'

})

</script>

</body>
</html>
