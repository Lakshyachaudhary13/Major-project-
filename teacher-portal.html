<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Complaint Portal - Resolved Complaints</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --primary: #4f46e5; --primary-dark: #4338ca; --secondary: #10b981; --accent: #f59e0b; --danger: #ef4444; --dark: #1f2937; --gray: #6b7280; --light: #f3f4f6; --white: #ffffff; }
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
        .portal-container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .portal-header { background: white; border-radius: 20px; padding: 2rem; margin-bottom: 2rem; box-shadow: 0 20px 60px rgba(0,0,0,0.2); text-align: center; }
        .portal-header h1 { color: var(--dark); margin-bottom: 0.5rem; }
        .portal-header p { color: var(--gray); }
        .complaints-section { background: white; border-radius: 20px; padding: 2rem; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
        .complaints-section h2 { color: var(--dark); margin-bottom: 1.5rem; }
        .complaints-table { width: 100%; border-collapse: collapse; }
        .complaints-table th, .complaints-table td { padding: 1rem; text-align: left; border-bottom: 1px solid var(--light); }
        .complaints-table th { background: var(--light); font-weight: 600; color: var(--dark); }
        .complaints-table tr:hover { background: var(--light); }
        .status-badge { padding: 0.25rem 0.75rem; border-radius: 20px; font-size: 0.8rem; font-weight: 600; text-transform: uppercase; background: #d1fae5; color: #10b981; }
        .btn { padding: 0.5rem 1rem; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; transition: all 0.3s; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-dark); }
        .logout-btn { position: absolute; top: 20px; right: 20px; background: var(--danger); color: white; border: none; padding: 0.5rem 1rem; border-radius: 10px; cursor: pointer; }
        .logout-btn:hover { background: #dc2626; }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: white; border-radius: 20px; padding: 2rem; max-width: 600px; width: 90%; max-height: 80vh; overflow-y: auto; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
        .modal-header h3 { color: var(--dark); }
        .close-btn { background: none; border: none; font-size: 1.5rem; cursor: pointer; color: var(--gray); }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-weight: 600; color: var(--dark); }
        .form-group p { margin: 0; color: var(--gray); }
        .toast { position: fixed; top: 20px; right: 20px; padding: 1rem 1.5rem; border-radius: 10px; color: white; font-weight: 500; z-index: 1000; animation: slideIn 0.3s ease; }
        .toast.success { background: var(--secondary); }
        .toast.error { background: var(--danger); }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
    </style>
</head>
<body>
    <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>

    <div class="portal-container">
        <div class="portal-header">
            <h1><i class="fas fa-chalkboard-teacher"></i> Teacher Complaint Portal</h1>
            <p>View resolved complaints</p>
        </div>

        <div class="complaints-section">
            <h2><i class="fas fa-check-circle"></i> Resolved Complaints</h2>

            <div class="table-container">
                <table class="complaints-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Student</th>
                            <th>Type</th>
                            <th>Category</th>
                            <th>Description</th>
                            <th>Resolved By</th>
                            <th>Resolved At</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="complaintsTableBody">
                        <!-- Resolved complaints will be loaded here -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Complaint Details Modal -->
    <div class="modal" id="complaintModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Resolved Complaint Details</h3>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            <div id="complaintDetails">
                <!-- Complaint details will be loaded here -->
            </div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script>
        const API_BASE = '/api';
        let resolvedComplaints = [];

        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        async function checkSession() {
            try {
                const response = await fetch(`${API_BASE}/teachers/session`, {
                    credentials: 'include'
                });
                if (!response.ok) {
                    window.location.href = 'teacher-login.html';
                }
            } catch (error) {
                window.location.href = 'teacher-login.html';
            }
        }

        async function loadResolvedComplaints() {
            try {
                const response = await fetch(`${API_BASE}/complaints?status=resolved`, {
                    credentials: 'include'
                });
                if (response.ok) {
                    resolvedComplaints = await response.json();
                    displayComplaints(resolvedComplaints);
                } else {
                    showToast('Failed to load resolved complaints', 'error');
                }
            } catch (error) {
                showToast('Error loading resolved complaints', 'error');
            }
        }

        function displayComplaints(complaints) {
            const tbody = document.getElementById('complaintsTableBody');
            tbody.innerHTML = '';

            complaints.forEach(complaint => {
                const row = document.createElement('tr');
                const formattedDate = complaint.resolvedAt ? new Date(complaint.resolvedAt).toLocaleDateString() : 'N/A';

                row.innerHTML = `
                    <td>${complaint.id}</td>
                    <td>${complaint.name}<br><small>${complaint.studentId}</small></td>
                    <td>${complaint.type}</td>
                    <td>${complaint.category}</td>
                    <td>${complaint.description.length > 50 ? complaint.description.substring(0, 50) + '...' : complaint.description}</td>
                    <td>${complaint.resolvedBy || 'N/A'}</td>
                    <td>${formattedDate}</td>
                    <td>
                        <button class="btn btn-primary" onclick="viewComplaint(${complaint.id})">View Details</button>
                    </td>
                `;
                tbody.appendChild(row);
            });
        }

        function viewComplaint(id) {
            const complaint = resolvedComplaints.find(c => c.id == id);
            if (complaint) {
                const details = document.getElementById('complaintDetails');
                const formattedDate = new Date(complaint.timestamp).toLocaleDateString();
                const resolvedDate = complaint.resolvedAt ? new Date(complaint.resolvedAt).toLocaleDateString() : 'N/A';

                details.innerHTML = `
                    <div class="form-group">
                        <label>Complaint ID:</label>
                        <p>${complaint.id}</p>
                    </div>
                    <div class="form-group">
                        <label>Student:</label>
                        <p>${complaint.name} (${complaint.studentId})</p>
                    </div>
                    <div class="form-group">
                        <label>Email:</label>
                        <p>${complaint.studentGmail}</p>
                    </div>
                    <div class="form-group">
                        <label>Type:</label>
                        <p>${complaint.type}</p>
                    </div>
                    <div class="form-group">
                        <label>Category:</label>
                        <p>${complaint.category}</p>
                    </div>
                    <div class="form-group">
                        <label>Description:</label>
                        <p>${complaint.description}</p>
                    </div>
                    <div class="form-group">
                        <label>Submitted:</label>
                        <p>${formattedDate}</p>
                    </div>
                    <div class="form-group">
                        <label>Resolved By:</label>
                        <p>${complaint.resolvedBy || 'N/A'}</p>
                    </div>
                    <div class="form-group">
                        <label>Resolved At:</label>
                        <p>${resolvedDate}</p>
                    </div>
                    ${complaint.resolutionNotes ? `
                    <div class="form-group">
                        <label>Resolution Notes:</label>
                        <p>${complaint.resolutionNotes}</p>
                    </div>
                    ` : ''}
                `;

                document.getElementById('complaintModal').style.display = 'flex';
            }
        }

        function closeModal() {
            document.getElementById('complaintModal').style.display = 'none';
        }

        async function logout() {
            try {
                await fetch(`${API_BASE}/teachers/logout`, {
                    method: 'POST',
                    credentials: 'include'
                });
            } catch (error) {
                // Ignore logout errors
            }
            window.location.href = 'index.html';
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', async () => {
            await checkSession();
            await loadResolvedComplaints();
        });

        // Close modal when clicking outside
        document.getElementById('complaintModal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('complaintModal')) {
                closeModal();
            }
        });
    </script>
</body>
</html>
