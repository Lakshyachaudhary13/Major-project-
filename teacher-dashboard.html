<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Dashboard - Complaint Management</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --primary: #4f46e5; --primary-dark: #4338ca; --secondary: #10b981; --accent: #f59e0b; --danger: #ef4444; --dark: #1f2937; --gray: #6b7280; --light: #f3f4f6; --white: #ffffff; }
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
        .dashboard-container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .dashboard-header { background: white; border-radius: 20px; padding: 2rem; margin-bottom: 2rem; box-shadow: 0 20px 60px rgba(0,0,0,0.2); text-align: center; }
        .dashboard-header h1 { color: var(--dark); margin-bottom: 0.5rem; }
        .dashboard-header p { color: var(--gray); }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
        .stat-card { background: white; border-radius: 15px; padding: 1.5rem; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .stat-card h3 { color: var(--dark); margin-bottom: 0.5rem; font-size: 1.1rem; }
        .stat-card .stat-number { font-size: 2rem; font-weight: 800; color: var(--primary); }
        .complaints-section { background: white; border-radius: 20px; padding: 2rem; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
        .complaints-section h2 { color: var(--dark); margin-bottom: 1.5rem; }
        .filters { display: flex; gap: 1rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
        .filter-group { display: flex; flex-direction: column; }
        .filter-group label { font-weight: 600; color: var(--dark); margin-bottom: 0.5rem; }
        .filter-group select, .filter-group input { padding: 0.5rem; border: 2px solid var(--light); border-radius: 10px; font-family: inherit; }
        .complaints-table { width: 100%; border-collapse: collapse; }
        .complaints-table th, .complaints-table td { padding: 1rem; text-align: left; border-bottom: 1px solid var(--light); }
        .complaints-table th { background: var(--light); font-weight: 600; color: var(--dark); }
        .complaints-table tr:hover { background: var(--light); }
        .status-badge { padding: 0.25rem 0.75rem; border-radius: 20px; font-size: 0.8rem; font-weight: 600; text-transform: uppercase; }
        .status-pending { background: #fef3c7; color: #f59e0b; }
        .status-in-progress { background: #dbeafe; color: #3b82f6; }
        .status-resolved { background: #d1fae5; color: #10b981; }
        .status-rejected { background: #fee2e2; color: #ef4444; }
        .btn { padding: 0.5rem 1rem; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; transition: all 0.3s; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-dark); }
        .btn-secondary { background: var(--gray); color: white; }
        .btn-secondary:hover { background: #4b5563; }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: white; border-radius: 20px; padding: 2rem; max-width: 600px; width: 90%; max-height: 80vh; overflow-y: auto; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
        .modal-header h3 { color: var(--dark); }
        .close-btn { background: none; border: none; font-size: 1.5rem; cursor: pointer; color: var(--gray); }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-weight: 600; color: var(--dark); }
        .form-group textarea, .form-group select { width: 100%; padding: 0.75rem; border: 2px solid var(--light); border-radius: 10px; font-family: inherit; resize: vertical; }
        .logout-btn { position: absolute; top: 20px; right: 20px; background: var(--danger); color: white; border: none; padding: 0.5rem 1rem; border-radius: 10px; cursor: pointer; }
        .logout-btn:hover { background: #dc2626; }
        .hidden { display: none; }
        .toast { position: fixed; top: 20px; right: 20px; padding: 1rem 1.5rem; border-radius: 10px; color: white; font-weight: 500; z-index: 1000; animation: slideIn 0.3s ease; }
        .toast.success { background: var(--secondary); }
        .toast.error { background: var(--danger); }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
    </style>
</head>
<body>
    <!-- public URL banner -->
    <div id="publicUrlBanner" class="public-url-banner hidden">
        <span id="publicUrlText"></span>
        <button class="copy-btn">Copy</button>
    </div>
    <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>

    <div class="dashboard-container">
        <div class="dashboard-header">
            <h1><i class="fas fa-chalkboard-teacher"></i> Teacher Dashboard</h1>
            <p>Manage student complaints</p>
            <div style="margin-top: 1rem;">
                <a href="teacher-portal.html" style="display: inline-block; padding: 0.75rem 1.5rem; background: var(--secondary); color: white; text-decoration: none; border-radius: 10px; font-weight: 600;">
                    <i class="fas fa-check-circle"></i> View Resolved Portal
                </a>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <h3><i class="fas fa-clock"></i> Pending</h3>
                <div class="stat-number" id="pendingCount">0</div>
            </div>
            <div class="stat-card">
                <h3><i class="fas fa-spinner"></i> In Progress</h3>
                <div class="stat-number" id="inProgressCount">0</div>
            </div>
            <div class="stat-card">
                <h3><i class="fas fa-check-circle"></i> Resolved</h3>
                <div class="stat-number" id="resolvedCount">0</div>
            </div>
            <div class="stat-card">
                <h3><i class="fas fa-times-circle"></i> Rejected</h3>
                <div class="stat-number" id="rejectedCount">0</div>
            </div>
        </div>

        <div class="complaints-section">
            <h2><i class="fas fa-list"></i> Complaints</h2>

            <div class="filters">
                <div class="filter-group">
                    <label><i class="fas fa-search"></i> Search</label>
                    <input type="text" id="searchInput" placeholder="Search by name, ID, or description" oninput="filterComplaints()">
                </div>
                <div class="filter-group">
                    <label><i class="fas fa-filter"></i> Status</label>
                    <select id="statusFilter" onchange="filterComplaints()">
                        <option value="">All Status</option>
                        <option value="pending">Pending</option>
                        <option value="in-progress">In Progress</option>
                        <option value="resolved">Resolved</option>
                        <option value="rejected">Rejected</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label><i class="fas fa-tag"></i> Category</label>
                    <select id="categoryFilter" onchange="filterComplaints()">
                        <option value="">All Categories</option>
                        <option value="general">General</option>
                        <option value="academic">Academic</option>
                        <option value="facility">Facility</option>
                        <option value="other">Other</option>
                    </select>
                </div>
            </div>

            <div class="table-container">
                <table class="complaints-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Student</th>
                            <th>Type</th>
                            <th>Category</th>
                            <th>Description</th>
                            <th>Status</th>
                            <th>Date</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="complaintsTableBody">
                        <!-- Complaints will be loaded here -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Complaint Details Modal -->
    <div class="modal" id="complaintModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Complaint Details</h3>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            <div id="complaintDetails">
                <!-- Complaint details will be loaded here -->
            </div>
            <div class="form-group">
                <label><i class="fas fa-edit"></i> Update Status</label>
                <select id="statusSelect">
                    <option value="pending">Pending</option>
                    <option value="in-progress">In Progress</option>
                    <option value="resolved">Resolved</option>
                    <option value="rejected">Rejected</option>
                </select>
            </div>
            <div class="form-group">
                <label><i class="fas fa-comment"></i> Resolution Notes</label>
                <textarea id="resolutionNotes" rows="4" placeholder="Add resolution notes..."></textarea>
            </div>
            <button class="btn btn-primary" onclick="updateComplaintStatus()">Update Status</button>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script>
        const API_BASE = '/api';
        let allComplaints = [];
        let currentComplaintId = null;

        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        async function checkSession() {
            try {
                const response = await fetch(`${API_BASE}/teachers/session`, {
                    credentials: 'include'
                });
                if (response.ok) {
                    const data = await response.json();
                    console.log('Session valid:', data);
                    return true;
                } else {
                    console.log('Session invalid, but allowing access for testing');
                    // Temporarily allow access even without valid session
                    return true;
                }
            } catch (error) {
                console.log('Session check error, but allowing access for testing:', error);
                return true;
            }
        }

        async function loadComplaints() {
            try {
                const response = await fetch(`${API_BASE}/complaints`, {
                    credentials: 'include'
                });
                if (response.ok) {
                    allComplaints = await response.json();
                    updateStats();
                    displayComplaints(allComplaints);
                } else {
                    showToast('Failed to load complaints', 'error');
                }
            } catch (error) {
                showToast('Error loading complaints', 'error');
            }
        }

        function updateStats() {
            const stats = {
                pending: 0,
                'in-progress': 0,
                resolved: 0,
                rejected: 0
            };

            allComplaints.forEach(complaint => {
                stats[complaint.status] = (stats[complaint.status] || 0) + 1;
            });

            document.getElementById('pendingCount').textContent = stats.pending;
            document.getElementById('inProgressCount').textContent = stats['in-progress'];
            document.getElementById('resolvedCount').textContent = stats.resolved;
            document.getElementById('rejectedCount').textContent = stats.rejected;
        }

        function displayComplaints(complaints) {
            const tbody = document.getElementById('complaintsTableBody');
            tbody.innerHTML = '';

            complaints.forEach(complaint => {
                const row = document.createElement('tr');
                const statusClass = `status-${complaint.status.replace('-', '')}`;
                const formattedDate = new Date(complaint.timestamp).toLocaleDateString();

                row.innerHTML = `
                    <td>${complaint.id}</td>
                    <td>${complaint.name}<br><small>${complaint.studentId}</small></td>
                    <td>${complaint.type}</td>
                    <td>${complaint.category}</td>
                    <td>${complaint.description.length > 50 ? complaint.description.substring(0, 50) + '...' : complaint.description}</td>
                    <td><span class="status-badge ${statusClass}">${complaint.status.replace('-', ' ')}</span></td>
                    <td>${formattedDate}</td>
                    <td>
                        <button class="btn btn-secondary" onclick="viewComplaint(${complaint.id})">View</button>
                    </td>
                `;
                tbody.appendChild(row);
            });
        }

        function filterComplaints() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const statusFilter = document.getElementById('statusFilter').value;
            const categoryFilter = document.getElementById('categoryFilter').value;

            const filtered = allComplaints.filter(complaint => {
                const matchesSearch = !searchTerm ||
                    complaint.name.toLowerCase().includes(searchTerm) ||
                    complaint.studentId.toLowerCase().includes(searchTerm) ||
                    complaint.description.toLowerCase().includes(searchTerm);
                const matchesStatus = !statusFilter || complaint.status === statusFilter;
                const matchesCategory = !categoryFilter || complaint.category === categoryFilter;

                return matchesSearch && matchesStatus && matchesCategory;
            });

            displayComplaints(filtered);
        }

        function viewComplaint(id) {
            const complaint = allComplaints.find(c => c.id == id);
            if (complaint) {
                currentComplaintId = id;
                const details = document.getElementById('complaintDetails');
                const formattedDate = new Date(complaint.timestamp).toLocaleDateString();
                const resolvedDate = complaint.resolvedAt ? new Date(complaint.resolvedAt).toLocaleDateString() : 'N/A';

                details.innerHTML = `
                    <div class="form-group">
                        <label>Complaint ID:</label>
                        <p>${complaint.id}</p>
                    </div>
                    <div class="form-group">
                        <label>Student:</label>
                        <p>${complaint.name} (${complaint.studentId})</p>
                    </div>
                    <div class="form-group">
                        <label>Email:</label>
                        <p>${complaint.studentGmail}</p>
                    </div>
                    <div class="form-group">
                        <label>Type:</label>
                        <p>${complaint.type}</p>
                    </div>
                    <div class="form-group">
                        <label>Category:</label>
                        <p>${complaint.category}</p>
                    </div>
                    <div class="form-group">
                        <label>Description:</label>
                        <p>${complaint.description}</p>
                    </div>
                    <div class="form-group">
                        <label>Submitted:</label>
                        <p>${formattedDate}</p>
                    </div>
                    <div class="form-group">
                        <label>Current Status:</label>
                        <p>${complaint.status}</p>
                    </div>
                    ${complaint.resolvedBy ? `
                    <div class="form-group">
                        <label>Resolved By:</label>
                        <p>${complaint.resolvedBy}</p>
                    </div>
                    <div class="form-group">
                        <label>Resolved At:</label>
                        <p>${resolvedDate}</p>
                    </div>
                    ` : ''}
                    ${complaint.resolutionNotes ? `
                    <div class="form-group">
                        <label>Resolution Notes:</label>
                        <p>${complaint.resolutionNotes}</p>
                    </div>
                    ` : ''}
                `;

                document.getElementById('statusSelect').value = complaint.status;
                document.getElementById('resolutionNotes').value = complaint.resolutionNotes || '';
                document.getElementById('complaintModal').style.display = 'flex';
            }
        }

        function closeModal() {
            document.getElementById('complaintModal').style.display = 'none';
            currentComplaintId = null;
        }

        async function updateComplaintStatus() {
            if (!currentComplaintId) return;

            const status = document.getElementById('statusSelect').value;
            const resolutionNotes = document.getElementById('resolutionNotes').value;

            try {
                const response = await fetch(`${API_BASE}/complaints/${currentComplaintId}/status`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ status, resolutionNotes })
                });

                if (response.ok) {
                    showToast('Complaint status updated successfully');
                    closeModal();
                    loadComplaints();
                } else {
                    showToast('Failed to update complaint status', 'error');
                }
            } catch (error) {
                showToast('Error updating complaint status', 'error');
            }
        }

        async function logout() {
            try {
                await fetch(`${API_BASE}/teachers/logout`, {
                    method: 'POST',
                    credentials: 'include'
                });
            } catch (error) {
                // Ignore logout errors
            }
            window.location.href = 'index.html';
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', async () => {
            await checkSession();
            await loadComplaints();
        });

        // Close modal when clicking outside
        document.getElementById('complaintModal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('complaintModal')) {
                closeModal();
            }
        });
    </script>
</body>
</html>
